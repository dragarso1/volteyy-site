<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Segui Voltey su Twitch</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100dvh;
    font-family: Arial, sans-serif;
    margin:0;
    padding:0;
    overflow:hidden;
    color:white;
    background: linear-gradient(135deg, #9146FF, #2a0a5e);
}

/* WRAPPER CENTRATO PERFETTO */
.wrapper{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    z-index:2;
}

/* CARD */
.container{
    width:100%;
    max-width:720px;
    padding:40px 30px;
    border-radius:18px;

    background: rgba(0,0,0,0.32);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);

    border: 1px solid rgba(255,255,255,0.18);
    box-shadow: 0 25px 70px rgba(0,0,0,0.5);
    text-align:center;
}

/* titolo */
h1{
    font-size:clamp(2.5rem, 6vw, 4.5rem);
    font-weight:900;
    text-transform:uppercase;
    letter-spacing:2px;
    margin-bottom:15px;
    text-shadow:0 0 25px rgba(145,70,255,0.8);
}

/* testo */
p{
    font-size:1.2rem;
    opacity:0.9;
    margin-bottom:30px;
}

/* bottone */
a.button{
    display:inline-block;
    padding:16px 34px;
    background:#fff;
    color:#9146FF;
    text-decoration:none;
    border-radius:12px;
    font-weight:bold;
    font-size:1.1rem;
    transition:0.25s ease;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

a.button:hover{
    transform:translateY(-3px) scale(1.04);
}

a.button:active{
    transform:scale(0.97);
}

/* PARTICELLE */
.shape{
    position:fixed;
    opacity:0.14;
    animation: float linear infinite;
    filter: drop-shadow(0 0 6px rgba(145,70,255,0.7));
}

/* elementi gaming */
.controller{
    width:42px;
    height:26px;
    border:3px solid white;
    border-radius:12px;
}
.headset{
    width:34px;
    height:28px;
    border:3px solid white;
    border-bottom:none;
    border-radius:20px 20px 0 0;
}
.mouse{
    width:20px;
    height:30px;
    border:3px solid white;
    border-radius:12px;
}
.keyboard{
    width:44px;
    height:18px;
    border:3px solid white;
    border-radius:6px;
}
.arcade{
    width:28px;
    height:28px;
    border:3px solid white;
    border-radius:6px;
}

@keyframes float{
    0%{transform:translateY(110vh) rotate(0deg);}
    100%{transform:translateY(-120px) rotate(360deg);}
}

/* posizioni particelle */
.s1{left:5%;animation-duration:14s;}
.s2{left:10%;animation-duration:11s;}
.s3{left:15%;animation-duration:16s;}
.s4{left:20%;animation-duration:12s;}
.s5{left:25%;animation-duration:15s;}
.s6{left:30%;animation-duration:13s;}
.s7{left:35%;animation-duration:18s;}
.s8{left:40%;animation-duration:10s;}
.s9{left:45%;animation-duration:17s;}
.s10{left:50%;animation-duration:12s;}
.s11{left:55%;animation-duration:14s;}
.s12{left:60%;animation-duration:11s;}
.s13{left:65%;animation-duration:16s;}
.s14{left:70%;animation-duration:13s;}
.s15{left:75%;animation-duration:15s;}
.s16{left:80%;animation-duration:12s;}
.s17{left:85%;animation-duration:18s;}
.s18{left:90%;animation-duration:14s;}
</style>
</head>

<body>

<!-- PARTICELLE -->
<div class="shape controller s1"></div>
<div class="shape headset s2"></div>
<div class="shape mouse s3"></div>
<div class="shape keyboard s4"></div>
<div class="shape arcade s5"></div>

<div class="shape controller s6"></div>
<div class="shape headset s7"></div>
<div class="shape mouse s8"></div>
<div class="shape keyboard s9"></div>
<div class="shape arcade s10"></div>

<div class="shape controller s11"></div>
<div class="shape headset s12"></div>
<div class="shape mouse s13"></div>
<div class="shape keyboard s14"></div>
<div class="shape arcade s15"></div>

<div class="shape controller s16"></div>
<div class="shape headset s17"></div>
<div class="shape mouse s18"></div>

<!-- CENTRATO -->
<div class="wrapper">
    <div class="container">
        <h1>SEGUI VOLTEY</h1>

        <p>Live gaming, community e contenuti Twitch.</p>

        <a class="button"
           href="https://www.twitch.tv/voltey_y"
           target="_blank"
           rel="noopener noreferrer">
            🎮 Vai al canale Twitch
        </a>
    </div>
</div>

</body>
</html>
