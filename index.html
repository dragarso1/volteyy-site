<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOLTEY_Y</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Press Start 2P', cursive;
    color:white;
    background:#0d0d0d;
    overflow:hidden;
    height:100vh;
}

/* BACKGROUND ANIMATO */
.bg{
    position:fixed;
    inset:0;
    background:linear-gradient(-45deg,#111,#1a1a1a,#0f0f0f,#1f1f1f);
    background-size:400% 400%;
    animation:gradient 10s ease infinite;
    z-index:-2;
}

@keyframes gradient{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

/* CENTRATURA */
.wrapper{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    width:min(90%,900px);
    z-index:5;
}

/* TITOLO */
h1{
    font-size:clamp(2rem,6vw,4rem);
    color:#00ff88;
    text-shadow:
        0 0 10px #00ff88,
        0 0 20px #00ff88,
        0 0 40px #00ff88;
    margin-bottom:25px;
}

/* TYPING */
#typing{
    font-size:12px;
    color:#cccccc;
    line-height:1.8;
    margin-bottom:35px;
    min-height:60px;
}

#typing::after{
    content:"_";
    animation:blink .8s infinite;
}

@keyframes blink{
    50%{
        opacity:0;
    }
}

/* BOTTONE */
.button{
    display:inline-block;
    padding:18px 38px;
    font-size:14px;
    color:white;
    background:#9146FF;
    text-decoration:none;
    border-radius:10px;
    box-shadow:0 0 25px #9146FF;
    transition:.3s;
    margin-bottom:35px;
}

.button:hover{
    transform:scale(1.1);
    box-shadow:0 0 50px #9146FF;
}

/* PICCONI */
.pickaxes{
    margin:20px 0;
}

.pickaxe{
    font-size:32px;
    display:inline-block;
    margin:0 10px;
    animation:swing 1.5s infinite ease-in-out;
}

.pickaxe:nth-child(2){
    animation-delay:.2s;
}

.pickaxe:nth-child(3){
    animation-delay:.4s;
}

@keyframes swing{
    0%,100%{
        transform:rotate(-10deg) translateY(0);
    }
    50%{
        transform:rotate(10deg) translateY(-8px);
    }
}

/* BLOCCHI */
.blocks{
    margin-top:25px;
}

.block{
    width:52px;
    height:52px;
    background:#3aa655;
    display:inline-block;
    margin:5px;
    border:2px solid #000;
    box-shadow:inset -4px -4px 0 rgba(0,0,0,.3);
    animation:bounce 2s infinite;
}

.block:nth-child(2){animation-delay:.2s;}
.block:nth-child(3){animation-delay:.4s;}
.block:nth-child(4){animation-delay:.6s;}
.block:nth-child(5){animation-delay:.8s;}

.diamond{
    background:#39c5ff;
    box-shadow:
        inset -4px -4px 0 rgba(0,0,0,.3),
        0 0 20px #39c5ff;
}

@keyframes bounce{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-12px);
    }
}

/* PARTICELLE */
.pixel{
    position:absolute;
    width:8px;
    height:8px;
    animation:float linear infinite;
    box-shadow:0 0 10px currentColor;
}

.pixel.green{
    background:#00ff88;
}

.pixel.blue{
    background:#39c5ff;
}

.pixel.purple{
    background:#9146FF;
}

@keyframes float{
    from{
        transform:translateY(100vh);
    }
    to{
        transform:translateY(-120vh);
    }
}

/* MOBILE */
@media(max-width:768px){

    #typing{
        font-size:10px;
    }

    .button{
        font-size:12px;
        padding:16px 24px;
    }

    .block{
        width:40px;
        height:40px;
    }

    .pickaxe{
        font-size:26px;
    }
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="wrapper">

    <h1>VOLTEY_Y</h1>

    <div id="typing"></div>

    <a class="button"
       href="https://www.twitch.tv/voltey_y"
       target="_blank"
       rel="noopener noreferrer">
        WATCH ON TWITCH
    </a>

    <div class="pickaxes">
        <div class="pickaxe">⛏</div>
        <div class="pickaxe">⛏</div>
        <div class="pickaxe">⛏</div>
    </div>

    <div class="blocks">
        <div class="block"></div>
        <div class="block"></div>
        <div class="block diamond"></div>
        <div class="block"></div>
        <div class="block"></div>
    </div>

</div>

<script>
/* TESTO TYPING */
const text =
"Benvenuto nel mondo di VOLTEY_Y — segui lo stream e unisciti alla community!";

let i = 0;

function typing(){
    if(i < text.length){
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typing, 35);
    }
}

typing();

/* PARTICELLE */
for(let i=0;i<80;i++){

    const p = document.createElement("div");

    const r = Math.random();

    if(r > 0.7){
        p.className = "pixel purple";
    }else if(r > 0.4){
        p.className = "pixel blue";
    }else{
        p.className = "pixel green";
    }

    p.style.left = Math.random()*100 + "vw";
    p.style.animationDuration = (Math.random()*8+4) + "s";
    p.style.animationDelay = -(Math.random()*10) + "s";
    p.style.opacity = Math.random();

    document.body.appendChild(p);
}
</script>

</body>
</html>
