<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Segui Voltey su Twitch</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#6441A5,#9146FF);
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    max-width:700px;
}

h1{
    font-size:clamp(2.5rem, 8vw, 5rem);
    margin-bottom:20px;
    text-transform:uppercase;
    font-weight:900;
}

p{
    font-size:1.2rem;
    margin-bottom:40px;
    opacity:0.9;
}

.btn{
    display:inline-block;
    padding:18px 40px;
    background:white;
    color:#9146FF;
    text-decoration:none;
    font-size:1.2rem;
    font-weight:bold;
    border-radius:999px;
    transition:all .3s ease;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
}

.btn:hover{
    transform:translateY(-4px) scale(1.05);
    box-shadow:0 15px 35px rgba(0,0,0,.3);
}
</style>
</head>
<body>

<div class="container">
    <h1>SEGUI VOLTEY SU TWITCH</h1>

    <p>
        Non perderti le live, i gameplay e i momenti migliori della community!
    </p>

    <a
        class="btn"
        href="https://www.twitch.tv/voltey"
        target="_blank"
        rel="noopener noreferrer"
    >
        🚀 Vai al canale Twitch
    </a>
</div>

</body>
</html>
